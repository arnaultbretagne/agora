<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="8 11 84 84" role="img" aria-label="Agora">
  <title>Agora</title>
  <style>
    /* Favicons don't inherit page CSS — theme-awareness must live INSIDE the SVG.
       Light chrome: brand coral. Dark chrome: cream (matches the in-app logo, which
       is already light-on-dark). To keep coral in dark instead, set the dark values
       below to #e0966f. */
    .fill { fill: #cc785c; }
    .stroke { fill: none; stroke: #cc785c; }
    @media (prefers-color-scheme: dark) {
      .fill { fill: #efe7db; }
      .stroke { stroke: #efe7db; }
    }
  </style>
  <rect class="fill" x="16" y="19" width="68" height="6.5" rx="2"/>
  <rect class="fill" x="21" y="27.5" width="58" height="5.5" rx="2"/>
