<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="8 11 84 84" role="img" aria-label="Agora">
  <title>Agora</title>
  <style>
    /* En sombre : on affine les barres et on ouvre l'ecart du chapiteau
       pour compenser l'irradiation (le corail clair "gonfle" sur navy). */
    @media (prefers-color-scheme: dark) {
      .aba { y: 18.7px; height: 6.1px; }
      .ech { y: 27.9px; height: 5.1px; }
      .fut { stroke-width: 3.7px; }
    }
  </style>
  <g fill="#cc785c">
    <rect class="aba" x="16" y="19" width="68" height="6.5" rx="2"/>
    <rect class="ech" x="21" y="27.5" width="58" height="5.5" rx="2"/>
  </g>
  <path class="fut" fill="none" stroke="#cc785c" stroke-width="4" stroke-linecap="round"
        d="M28 39V85.5M39 39V76M50 39V72.3M61 39V76.9M72 39V67.5"/>
</svg>
